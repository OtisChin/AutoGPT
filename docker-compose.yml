services:
  backend:
    build:
      context: ../AutoGPT-base
      dockerfile: Dockerfile
    image: autogpt-redeem-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      DATABASE_PATH: /app/data/autogpt.sqlite
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-autogpt_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      ICE_UPI_BASE_URL: ${ICE_UPI_BASE_URL:-https://upi.iceaix.com}
      ICE_UPI_ACCESS_TOKEN: ${ICE_UPI_ACCESS_TOKEN:?set ICE_UPI_ACCESS_TOKEN in .env}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-2500}
      MAX_CONCURRENT_UPSTREAM: ${MAX_CONCURRENT_UPSTREAM:-3}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - autogpt-backend-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_API_BASE_URL: ${NEXT_PUBLIC_BACKEND_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_UPSTREAM_API_BASE_URL: ${NEXT_PUBLIC_UPSTREAM_API_BASE_URL:-https://cha.nerver.cc}
    image: autogpt-redeem-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  autogpt-backend-data:
